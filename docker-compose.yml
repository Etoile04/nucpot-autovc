version: "3.8"

services:
  api:
    build: .
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=postgresql://nucpot:nucpot@nucpot-nucpot-db-1:5432/nucpot
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
    volumes:
      - autovc-data:/app/data
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build: .
    command: ["python", "-m", "celery", "-A", "autovc.workers.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    environment:
      - DATABASE_URL=postgresql://nucpot:nucpot@nucpot-nucpot-db-1:5432/nucpot
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
    volumes:
      - autovc-data:/app/data
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  autovc-data:
  redis-data:

networks:
  default:
    name: nucpot_default
    external: true
